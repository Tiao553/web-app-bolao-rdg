services:

  db:
    image: postgres:16-alpine
    container_name: bolao_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
      POSTGRES_DB: bolao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bolao_backend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+psycopg://bolao:bolao@db:5432/bolao
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: bolao_frontend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_BASE_URL: http://backend:8000
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bolao_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bolao.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
